services:
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  web:
    image: lingxing-rpa:local
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - redis
    environment: &app-env
      REDIS_URL: redis://redis:6379/0
      PLAYWRIGHT_HEADLESS: "1"
      BROWSER_MAX_CONCURRENCY: "1"
      TASK_RETENTION_DAYS: "30"
      WORKER_POLL_INTERVAL_SECONDS: "5"
      HEARTBEAT_INTERVAL_SECONDS: "15"
      SQLITE_JOURNAL_MODE: "DELETE"
    volumes:
      - ./data:/app/data
      - ./lingxing_rpa.local.json:/app/lingxing_rpa.local.json:ro
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  worker:
    image: lingxing-rpa:local
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.workers.task_worker"]
    depends_on:
      - redis
    environment:
      <<: *app-env
    volumes:
      - ./data:/app/data
      - ./lingxing_rpa.local.json:/app/lingxing_rpa.local.json:ro
    restart: unless-stopped

volumes:
  redis-data:
